<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan Warga - TXT Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .table-container::-webkit-scrollbar { height: 6px; }
        .table-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen text-slate-800 p-2 sm:p-6">

    <div class="max-w-6xl mx-auto">
        <header class="mb-6 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4 text-center md:text-left">
                <div>
                    <h1 class="text-2xl font-bold text-slate-800">Laporan Pendidikan Warga</h1>
                    <p class="text-slate-500 text-sm">KP. BONGKOR DESA CINTARAKYAT</p>
                </div>
                <div class="flex flex-col gap-2 w-full md:w-auto">
                    <button onclick="downloadAsTXT()" class="bg-slate-800 hover:bg-black text-white px-6 py-3 rounded-xl text-sm font-bold shadow-md transition flex items-center justify-center gap-2">
                        📄 DOWNLOAD FILE LAPORAN (.TXT)
                    </button>
                    <button onclick="copyToWA()" class="bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-xl text-sm font-bold shadow-md transition flex items-center justify-center gap-2">
                        💬 SALIN UNTUK WHATSAPP
                    </button>
                </div>
            </div>
            <div id="status-msg" class="hidden mt-4 text-center p-2 bg-green-100 text-green-700 rounded-lg text-xs font-bold">
                Teks Berhasil Disalin!
            </div>
        </header>

        <div class="bg-white shadow-xl rounded-2xl overflow-hidden border border-slate-200">
            <div class="table-container overflow-x-auto">
                <table class="w-full text-sm text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-800 text-white">
                            <th class="px-4 py-4 text-center border-r border-slate-700 w-12">No</th>
                            <th class="px-4 py-4 border-r border-slate-700 min-w-[150px]">Nama</th>
                            <th class="px-4 py-4 border-r border-slate-700 min-w-[200px]">Alamat</th>
                            <th class="px-2 py-4 text-center border-r border-slate-700">RT/RW</th>
                            <th class="px-4 py-4 min-w-[160px]">Pendidikan Terakhir</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-slate-200">
                        <!-- Diisi oleh JS -->
                    </tbody>
                </table>
            </div>
        </div>

        <div class="mt-6 flex justify-center pb-10">
            <button onclick="clearData()" class="text-slate-400 hover:text-red-500 text-xs font-medium transition flex items-center gap-1">
                🗑️ Hapus Semua Isian
            </button>
        </div>
    </div>

    <script>
        const namaList = [
            "Usep", "Dede Sobarna", "Aceng Kamaludin", "Muhamad Syahid", "Fauji Nurwahid",
            "Dedy Permana", "Aip Kusmana", "Fiqri Moch Rijaludin", "Iwan Sulaeman", "Amang Ikhlas",
            "Imam Arifin", "Dede Rendi", "Ade Heri", "Yuda Saepul Akbar", "Dede Muhamad Amin",
            "Ajid Sumpena", "Gugum Gumilar Ramadhan", "Caca Tarmudin", "Ahmad Rijaludin", "Khoerul Imam",
            "U. Rohmat", "Hendra", "Khotibin", "Syamsul Hidayat", "Budi Sumarna", "Alo Umaran",
            "Emun", "Hadi Sopian", "Abuy Jamhur", "Hermansyah"
        ];

        const storageKey = 'warga_report_txt_v1';
        const alamatStatic = "KP. BONGKOR DESA CINTARAKYAT";

        function init() {
            const tbody = document.getElementById('table-body');
            const savedData = JSON.parse(localStorage.getItem(storageKey) || '{}');

            namaList.forEach((nama, index) => {
                const id = index + 1;
                const d = savedData[id] || { rt: '01', rw: '01', edu: '' };
                
                const tr = document.createElement('tr');
                tr.className = index % 2 === 0 ? 'bg-white' : 'bg-slate-50';
                tr.innerHTML = `
                    <td class="px-4 py-3 text-center font-bold text-slate-400 border-r">${id}</td>
                    <td class="px-4 py-3 font-bold text-slate-700 border-r">${nama}</td>
                    <td class="px-4 py-3 text-slate-500 border-r text-[10px] uppercase">${alamatStatic}</td>
                    <td class="px-2 py-2 border-r">
                        <div class="flex items-center gap-1">
                            <select onchange="updateData(${id}, 'rt', this.value)" class="bg-transparent text-xs font-bold text-slate-600">
                                ${[1,2,3,4,5,6,7,8,9].map(n => `<option value="0${n}" ${d.rt == '0'+n ? 'selected' : ''}>0${n}</option>`).join('')}
                            </select>
                            <span>/</span>
                            <select onchange="updateData(${id}, 'rw', this.value)" class="bg-transparent text-xs font-bold text-slate-600">
                                ${[1,2,3,4,5,6,7,8,9].map(n => `<option value="0${n}" ${d.rw == '0'+n ? 'selected' : ''}>0${n}</option>`).join('')}
                            </select>
                        </div>
                    </td>
                    <td class="px-3 py-2">
                        <select onchange="updateData(${id}, 'edu', this.value)" class="w-full p-2 border border-slate-300 rounded-lg text-xs font-bold bg-white">
                            <option value="">- Pilih -</option>
                            ${["SD/MI", "SMP", "SMA", "D1", "D2", "S1"].map(opt => `<option value="${opt}" ${d.edu === opt ? 'selected' : ''}>${opt}</option>`).join('')}
                        </select>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function updateData(id, field, val) {
            const data = JSON.parse(localStorage.getItem(storageKey) || '{}');
            if (!data[id]) data[id] = { rt: '01', rw: '01', edu: '' };
            data[id][field] = val;
            localStorage.setItem(storageKey, JSON.stringify(data));
        }

        function downloadAsTXT() {
            const savedData = JSON.parse(localStorage.getItem(storageKey) || '{}');
            let content = "LAPORAN PENDIDIKAN WARGA\n";
            content += "LOKASI: KP. BONGKOR DESA CINTARAKYAT\n";
            content += "TANGGAL: " + new Date().toLocaleDateString('id-ID') + "\n";
            content += "------------------------------------------------------------\n";
            content += "NO | NAMA                | RT/RW | PENDIDIKAN\n";
            content += "------------------------------------------------------------\n";

            namaList.forEach((nama, index) => {
                const id = index + 1;
                const d = savedData[id] || { rt: '01', rw: '01', edu: '-' };
                const rtRw = `${d.rt}/${d.rw}`;
                const edu = d.edu || "-";
                
                // Format padding agar kolom lurus di TXT
                const pNama = nama.padEnd(20, ' ');
                const pNo = id.toString().padEnd(2, ' ');
                
                content += `${pNo} | ${pNama} | ${rtRw} | ${edu}\n`;
            });

            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Laporan_Warga_${new Date().toISOString().split('T')[0]}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        function copyToWA() {
            const savedData = JSON.parse(localStorage.getItem(storageKey) || '{}');
            let text = "*LAPORAN PENDIDIKAN WARGA*\n";
            text += "_KP. BONGKOR DESA CINTARAKYAT_\n\n";

            namaList.forEach((nama, index) => {
                const id = index + 1;
                const d = savedData[id] || { rt: '01', rw: '01', edu: '-' };
                if (d.edu) {
                    text += `${id}. *${nama}* (RT${d.rt}/RW${d.rw}) : ${d.edu}\n`;
                }
            });

            // Menyalin ke clipboard
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);

            const msg = document.getElementById('status-msg');
            msg.classList.remove('hidden');
            setTimeout(() => msg.classList.add('hidden'), 3000);
        }

        function clearData() {
            if(confirm('Hapus semua isian?')) {
                localStorage.removeItem(storageKey);
                window.location.reload();
            }
        }

        window.onload = init;
    </script>
</body>
</html>
