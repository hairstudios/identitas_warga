<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Laporan Data Warga</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Library untuk PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        /* Custom scrollbar untuk tabel pada mobile */
        .table-container::-webkit-scrollbar {
            height: 6px;
        }
        .table-container::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        @media print {
            .no-print { display: none; }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-800">

    <div class="max-w-6xl mx-auto px-4 py-8">
        <!-- Header -->
        <header class="mb-8 text-center sm:text-left no-print">
            <h1 class="text-3xl font-bold text-indigo-700">Laporan Data Pendidikan Warga</h1>
            <p class="text-slate-600 mt-2">KP. BONGKOR DESA CINTARAKYAT</p>
            <div class="mt-4 p-3 bg-amber-50 border border-amber-200 rounded-lg inline-block text-sm text-amber-800 italic">
                ✨ Data tersimpan otomatis di perangkat Anda (Browser).
            </div>
        </header>

        <!-- Main Table Area -->
        <div id="print-area" class="bg-white shadow-xl rounded-xl overflow-hidden border border-slate-200">
            <!-- Header khusus PDF (Hanya muncul saat download PDF) -->
            <div class="hidden block print:block p-6 border-b-2 border-indigo-100 text-center">
                <h2 class="text-2xl font-bold uppercase tracking-wider">Laporan Pendidikan Terakhir Warga</h2>
                <p class="text-lg">Alamat: KP. BONGKOR DESA CINTARAKYAT</p>
                <div class="mt-2 h-1 bg-indigo-600 w-32 mx-auto"></div>
            </div>

            <div class="table-container overflow-x-auto">
                <table class="w-full text-sm text-left border-collapse">
                    <thead class="bg-indigo-600 text-white uppercase text-xs">
                        <tr>
                            <th class="px-4 py-4 border-b border-indigo-500 text-center w-12">No</th>
                            <th class="px-4 py-4 border-b border-indigo-500 min-w-[200px]">Nama Lengkap</th>
                            <th class="px-4 py-4 border-b border-indigo-500 min-w-[250px]">Alamat</th>
                            <th class="px-2 py-4 border-b border-indigo-500 text-center w-24">RT</th>
                            <th class="px-2 py-4 border-b border-indigo-500 text-center w-24">RW</th>
                            <th class="px-4 py-4 border-b border-indigo-500 min-w-[180px]">Pendidikan Terakhir</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- Rows will be generated by JS -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="mt-8 flex flex-col sm:flex-row gap-4 justify-center items-center no-print">
            <button onclick="downloadPDF()" class="w-full sm:w-auto bg-green-600 hover:bg-green-700 text-white font-bold py-4 px-8 rounded-full shadow-lg transform transition active:scale-95 flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="C12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                </svg>
                SIMPAN & KIRIM SEBAGAI PDF
            </button>
            
            <button onclick="clearAllData()" class="w-full sm:w-auto text-slate-500 hover:text-red-600 font-medium text-sm transition">
                Reset Semua Data
            </button>
        </div>
        
        <footer class="mt-12 text-center text-slate-400 text-xs no-print">
            &copy; 2024 Data Kolektor - Siap di-deploy di GitHub Pages.
        </footer>
    </div>

    <script>
        const namaList = [
            "Usep", "Dede Sobarna", "Aceng Kamaludin", "Muhamad Syahid", "Fauji Nurwahid",
            "Dedy Permana", "Aip Kusmana", "Fiqri Moch Rijaludin", "Iwan Sulaeman", "Amang Ikhlas",
            "Imam Arifin", "Dede Rendi", "Ade Heri", "Yuda Saepul Akbar", "Dede Muhamad Amin",
            "Ajid Sumpena", "Gugum Gumilar Ramadhan", "Caca Tarmudin", "Ahmad Rijaludin", "Khoerul Imam",
            "U. Rohmat", "Hendra", "Khotibin", "Syamsul Hidayat", "Budi Sumarna", "Alo Umaran",
            "Emun", "Hadi Sopian", "Abuy Jamhur", "Hermansyah"
        ];

        const alamatDefault = "KP. BONGKOR DESA CINTARAKYAT";
        const pendidikanOptions = ["SD/MI", "SMP", "SMA", "D1", "D2", "S1"];
        const rtRwOptions = ["01", "02", "03", "04", "05", "06", "07", "08", "09"];

        const storageKey = 'crud_warga_data';

        // Inisialisasi Tabel
        function initTable() {
            const tbody = document.getElementById('table-body');
            const savedData = JSON.parse(localStorage.getItem(storageKey) || '{}');

            namaList.forEach((nama, index) => {
                const rowId = index + 1;
                const rowData = savedData[rowId] || { rt: '01', rw: '01', pendidikan: '' };

                const tr = document.createElement('tr');
                tr.className = index % 2 === 0 ? 'bg-white' : 'bg-slate-50';
                tr.innerHTML = `
                    <td class="px-4 py-3 border-b text-center font-medium text-slate-500">${rowId}</td>
                    <td class="px-4 py-3 border-b font-semibold text-slate-700">${nama}</td>
                    <td class="px-4 py-3 border-b text-slate-600">${alamatDefault}</td>
                    <td class="px-2 py-3 border-b">
                        <select onchange="saveData(${rowId}, 'rt', this.value)" class="w-full p-1 border rounded bg-white text-xs focus:ring-2 focus:ring-indigo-400 outline-none">
                            ${rtRwOptions.map(opt => `<option value="${opt}" ${rowData.rt === opt ? 'selected' : ''}>${opt}</option>`).join('')}
                        </select>
                    </td>
                    <td class="px-2 py-3 border-b">
                        <select onchange="saveData(${rowId}, 'rw', this.value)" class="w-full p-1 border rounded bg-white text-xs focus:ring-2 focus:ring-indigo-400 outline-none">
                            ${rtRwOptions.map(opt => `<option value="${opt}" ${rowData.rw === opt ? 'selected' : ''}>${opt}</option>`).join('')}
                        </select>
                    </td>
                    <td class="px-4 py-3 border-b">
                        <select onchange="saveData(${rowId}, 'pendidikan', this.value)" class="w-full p-2 border rounded bg-white text-sm focus:ring-2 focus:ring-indigo-400 outline-none">
                            <option value="">Pilih Pendidikan</option>
                            ${pendidikanOptions.map(opt => `<option value="${opt}" ${rowData.pendidikan === opt ? 'selected' : ''}>${opt}</option>`).join('')}
                        </select>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Simpan ke LocalStorage
        function saveData(rowId, field, value) {
            const currentData = JSON.parse(localStorage.getItem(storageKey) || '{}');
            if (!currentData[rowId]) currentData[rowId] = {};
            currentData[rowId][field] = value;
            localStorage.setItem(storageKey, JSON.stringify(currentData));
        }

        // Hapus Data
        function clearAllData() {
            if (confirm('Apakah Anda yakin ingin menghapus semua isian?')) {
                localStorage.removeItem(storageKey);
                window.location.reload();
            }
        }

        // Fungsi Download PDF
        function downloadPDF() {
            const element = document.getElementById('print-area');
            const opt = {
                margin:       [0.5, 0.3],
                filename:     'Laporan_Data_Warga_Bongkor.pdf',
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true },
                jsPDF:        { unit: 'in', format: 'letter', orientation: 'portrait' }
            };

            // Tambahkan loading state
            const btn = event.currentTarget;
            const originalText = btn.innerHTML;
            btn.innerHTML = "Memproses PDF...";
            btn.disabled = true;

            html2pdf().set(opt).from(element).save().then(() => {
                btn.innerHTML = originalText;
                btn.disabled = false;
            });
        }

        window.onload = initTable;
    </script>
</body>
</html>
